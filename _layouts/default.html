<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title | default: "京滋労働組合共済会" }}</title>
  <meta name="description" content="{{ page.description | default: '京滋労働組合共済会の共済制度を紹介しています。火災共済、生命共済、医療共済、交通災害共済など、組合員の暮らしを守る各種共済制度をおすすめします。' }}">
  <meta name="format-detection" content="telephone=no">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="京滋労働組合共済会">
  <meta property="og:title" content="{{ page.title | default: '京滋労働組合共済会' }}">
  <meta property="og:description" content="{{ page.description | default: '京滋労働組合共済会の共済制度を紹介しています。火災共済、生命共済、医療共済、交通災害共済など、組合員の暮らしを守る各種共済制度をおすすめします。' }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/images/ogp-logo-1200x630.jpg' | absolute_url }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: '京滋労働組合共済会' }}">
  <meta name="twitter:description" content="{{ page.description | default: '京滋労働組合共済会の共済制度を紹介しています。火災共済、生命共済、医療共済、交通災害共済など、組合員の暮らしを守る各種共済制度をおすすめします。' }}">
  <meta name="twitter:image" content="{{ '/images/ogp-logo-1200x630.jpg' | absolute_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "name": "京滋労働組合共済会",
        "url": "{{ '/' | absolute_url }}"
      },
      {
        "@type": "Organization",
        "name": "京滋労働組合共済会",
        "url": "{{ '/' | absolute_url }}",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ '/images/logo.png' | absolute_url }}"
        }
      }
    ]
  }
  </script>

  {% if page.structured_data_json_ld %}
  <script type="application/ld+json">
  {{ page.structured_data_json_ld }}
  </script>
  {% endif %}

  {% if page.breadcrumb_json_ld %}
  <script type="application/ld+json">
  {{ page.breadcrumb_json_ld }}
  </script>
  {% endif %}
</head>
<body class="{% if page.body_class %}{{ page.body_class }}{% endif %}">

  <a href="#main-content" class="skip-link">本文へ移動</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/js/script.js' | relative_url }}"></script>
</body>
</html>
