<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はじめてのGitHub Pages</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    header {
      background: #1f4e79;
      color: white;
      padding: 56px 20px;
      text-align: center;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
    }
    .button {
      display: inline-block;
      background: #2e8b57;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>はじめてのGitHub Pages</h1>
    <p>このページはGitHub Pagesで公開されています。</p>
  </header>

  <main>
    <section class="card">
      <h2>サイト公開テスト成功</h2>
      <p>このHTMLが表示されれば、GitHub Pagesの公開は成功です。</p>
      <a class="button" href="#">ボタン例</a>
    </section>
  </main>
</body>
</html>
